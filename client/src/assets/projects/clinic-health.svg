<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgClinic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="clinicLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="doctorCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F0F9FF"/>
    </linearGradient>
    <linearGradient id="blueBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="shadowClinic">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00000025"/>
    </filter>
    <filter id="shadowClinicSm">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#00000015"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#EFF6FF" rx="12"/>
  <!-- Browser chrome -->
  <rect x="0" y="0" width="800" height="40" fill="#1E293B" rx="12"/>
  <rect x="0" y="24" width="800" height="16" fill="#1E293B"/>
  <circle cx="20" cy="20" r="6" fill="#EF4444"/>
  <circle cx="40" cy="20" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="20" r="6" fill="#22C55E"/>

  <!-- Header -->
  <rect x="0" y="40" width="800" height="65" fill="#ffffff" filter="url(#shadowClinicSm)"/>
  <rect x="20" y="53" width="32" height="32" rx="8" fill="#DBEAFE"/>
  <text x="25" y="75" font-family="Arial, sans-serif" font-size="18" fill="#3B82F6">🏥</text>
  <text x="62" y="78" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1E3A5F">MediCare Clinic</text>
  <text x="380" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3B82F6">Home</text>
  <text x="435" y="78" font-family="Arial, sans-serif" font-size="14" fill="#64748B">Doctors</text>
  <text x="505" y="78" font-family="Arial, sans-serif" font-size="14" fill="#64748B">Services</text>
  <text x="575" y="78" font-family="Arial, sans-serif" font-size="14" fill="#64748B">About</text>
  <rect x="650" y="56" width="120" height="32" rx="16" fill="url(#bgClinic)"/>
  <text x="680" y="77" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Book Now</text>

  <!-- Hero section -->
  <rect x="20" y="120" width="490" height="170" rx="14" fill="url(#bgClinic)" filter="url(#shadowClinic)"/>
  <text x="40" y="162" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">Your Health, Our Priority</text>
  <text x="40" y="192" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Expert medical care with compassion and advanced technology</text>
  <rect x="40" y="215" width="160" height="42" rx="21" fill="#ffffff"/>
  <text x="75" y="242" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3B82F6">Book Appointment</text>
  <text x="220" y="242" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#BFDBFE">📞 (555) 123-4567</text>

  <!-- Doctor profile -->
  <rect x="525" y="120" width="255" height="170" rx="14" fill="url(#doctorCard)" filter="url(#shadowClinic)"/>
  <circle cx="600" cy="155" r="28" fill="#DBEAFE"/>
  <text x="590" y="162" font-family="Arial, sans-serif" font-size="24" fill="#3B82F6">👨‍⚕️</text>
  <text x="565" y="200" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E293B">Dr. Sarah Mitchell</text>
  <text x="565" y="218" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Cardiologist • 15 yrs exp.</text>
  <rect x="540" y="235" width="225" height="1" fill="#DBEAFE"/>
  <text x="540" y="255" font-family="Arial, sans-serif" font-size="12" fill="#3B82F6">★ 4.9/5 (128 reviews)</text>
  <text x="540" y="272" font-family="Arial, sans-serif" font-size="12" fill="#64748B">🕐 Next available: Today 3PM</text>

  <!-- Services section -->
  <text x="30" y="315" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E3A5F">Our Services</text>

  <rect x="20" y="330" width="185" height="145" rx="12" fill="#ffffff" filter="url(#shadowClinicSm)"/>
  <rect x="35" y="345" width="35" height="35" rx="10" fill="#DBEAFE"/>
  <text x="40" y="369" font-family="Arial, sans-serif" font-size="20" fill="#3B82F6">🩺</text>
  <text x="35" y="400" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">General Checkup</text>
  <text x="35" y="418" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Comprehensive health screening</text>
  <text x="35" y="440" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3B82F6">From $99 →</text>

  <rect x="218" y="330" width="185" height="145" rx="12" fill="#ffffff" filter="url(#shadowClinicSm)"/>
  <rect x="233" y="345" width="35" height="35" rx="10" fill="#DBEAFE"/>
  <text x="238" y="369" font-family="Arial, sans-serif" font-size="20" fill="#3B82F6">🦷</text>
  <text x="233" y="400" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">Dental Care</text>
  <text x="233" y="418" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Teeth cleaning &amp; checkups</text>
  <text x="233" y="440" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3B82F6">From $79 →</text>

  <rect x="416" y="330" width="185" height="145" rx="12" fill="#ffffff" filter="url(#shadowClinicSm)"/>
  <rect x="431" y="345" width="35" height="35" rx="10" fill="#DBEAFE"/>
  <text x="436" y="369" font-family="Arial, sans-serif" font-size="20" fill="#3B82F6">🫀</text>
  <text x="431" y="400" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">Cardiology</text>
  <text x="431" y="418" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Heart health &amp; diagnostics</text>
  <text x="431" y="440" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3B82F6">From $199 →</text>

  <rect x="614" y="330" width="165" height="145" rx="12" fill="#ffffff" filter="url(#shadowClinicSm)"/>
  <rect x="629" y="345" width="35" height="35" rx="10" fill="#DBEAFE"/>
  <text x="634" y="369" font-family="Arial, sans-serif" font-size="20" fill="#3B82F6">🧪</text>
  <text x="629" y="400" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">Lab Tests</text>
  <text x="629" y="418" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Blood work &amp; analysis</text>
  <text x="629" y="440" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3B82F6">From $49 →</text>
</svg>