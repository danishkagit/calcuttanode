<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgOrder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="orderLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="productCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="statusGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="shadowOrder">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#00000025"/>
    </filter>
    <filter id="shadowOrderSm">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000015"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#F0FDF4" rx="12"/>
  <!-- Browser chrome -->
  <rect x="0" y="0" width="800" height="40" fill="#1E293B" rx="12"/>
  <rect x="0" y="24" width="800" height="16" fill="#1E293B"/>
  <circle cx="20" cy="20" r="6" fill="#EF4444"/>
  <circle cx="40" cy="20" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="20" r="6" fill="#22C55E"/>

  <!-- Top bar -->
  <rect x="0" y="40" width="800" height="60" fill="#ffffff" filter="url(#shadowOrderSm)"/>
  <text x="25" y="78" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#16A34A">QuickMart</text>
  <text x="25" y="95" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Delivery in 30 min</text>
  <rect x="200" y="58" width="300" height="28" rx="14" fill="#F0FDF4"/>
  <text x="215" y="77" font-family="Arial, sans-serif" font-size="13" fill="#64748B">🔍 Search products...</text>
  <rect x="530" y="58" width="100" height="28" rx="14" fill="#22C55E"/>
  <text x="548" y="77" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">🛒 Cart (3)</text>
  <text x="660" y="77" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#16A34A">Track Order</text>

  <!-- Categories -->
  <rect x="15" y="110" width="100" height="32" rx="16" fill="url(#bgOrder)"/>
  <text x="40" y="131" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">All</text>
  <rect x="125" y="110" width="100" height="32" rx="16" fill="#ffffff" stroke="#BBF7D0" stroke-width="1"/>
  <text x="140" y="131" font-family="Arial, sans-serif" font-size="12" fill="#16A34A">🍎 Fruits</text>
  <rect x="235" y="110" width="110" height="32" rx="16" fill="#ffffff" stroke="#BBF7D0" stroke-width="1"/>
  <text x="250" y="131" font-family="Arial, sans-serif" font-size="12" fill="#16A34A">🥦 Vegetables</text>
  <rect x="355" y="110" width="100" height="32" rx="16" fill="#ffffff" stroke="#BBF7D0" stroke-width="1"/>
  <text x="370" y="131" font-family="Arial, sans-serif" font-size="12" fill="#16A34A">🥛 Dairy</text>
  <rect x="465" y="110" width="100" height="32" rx="16" fill="#ffffff" stroke="#BBF7D0" stroke-width="1"/>
  <text x="480" y="131" font-family="Arial, sans-serif" font-size="12" fill="#16A34A">🍞 Bakery</text>

  <!-- Active order tracking -->
  <rect x="15" y="155" width="770" height="50" rx="12" fill="url(#bgOrder)" filter="url(#shadowOrder)"/>
  <text x="35" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">📦 Active Order</text>
  <text x="155" y="185" font-family="Arial, sans-serif" font-size="13" fill="#DCFCE7">#ORD-4821 • Arriving in ~12 min</text>
  <!-- Progress dots -->
  <circle cx="580" cy="180" r="6" fill="#ffffff" opacity="0.4"/>
  <circle cx="610" cy="180" r="6" fill="#ffffff" opacity="0.6"/>
  <circle cx="640" cy="180" r="6" fill="#ffffff" opacity="0.8"/>
  <circle cx="670" cy="180" r="6" fill="#ffffff"/>
  <circle cx="700" cy="180" r="6" fill="#ffffff" opacity="0.4"/>
  <circle cx="730" cy="180" r="6" fill="#ffffff" opacity="0.4"/>

  <!-- Product grid -->
  <rect x="15" y="220" width="185" height="255" rx="14" fill="url(#productCard)" filter="url(#shadowOrder)"/>
  <rect x="30" y="238" width="155" height="110" rx="10" fill="#F0FDF4"/>
  <text x="90" y="305" font-family="Arial, sans-serif" font-size="36" fill="#22C55E">🍎</text>
  <text x="30" y="375" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">Fresh Red Apples</text>
  <text x="30" y="395" font-family="Arial, sans-serif" font-size="12" fill="#64748B">1 kg pack</text>
  <text x="30" y="420" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#16A34A">$4.99</text>
  <rect x="130" y="410" width="55" height="28" rx="14" fill="#22C55E"/>
  <text x="145" y="430" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Add +</text>

  <rect x="213" y="220" width="185" height="255" rx="14" fill="url(#productCard)" filter="url(#shadowOrder)"/>
  <rect x="228" y="238" width="155" height="110" rx="10" fill="#F0FDF4"/>
  <text x="290" y="305" font-family="Arial, sans-serif" font-size="36" fill="#22C55E">🥛</text>
  <text x="228" y="375" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">Organic Milk</text>
  <text x="228" y="395" font-family="Arial, sans-serif" font-size="12" fill="#64748B">1 gallon</text>
  <text x="228" y="420" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#16A34A">$3.49</text>
  <rect x="328" y="410" width="55" height="28" rx="14" fill="#22C55E"/>
  <text x="343" y="430" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Add +</text>

  <rect x="411" y="220" width="185" height="255" rx="14" fill="url(#productCard)" filter="url(#shadowOrder)"/>
  <rect x="426" y="238" width="155" height="110" rx="10" fill="#F0FDF4"/>
  <text x="490" y="305" font-family="Arial, sans-serif" font-size="36" fill="#22C55E">🍞</text>
  <text x="426" y="375" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">Whole Wheat Bread</text>
  <text x="426" y="395" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Freshly baked</text>
  <text x="426" y="420" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#16A34A">$2.99</text>
  <rect x="526" y="410" width="55" height="28" rx="14" fill="#22C55E"/>
  <text x="541" y="430" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Add +</text>

  <rect x="609" y="220" width="170" height="255" rx="14" fill="url(#productCard)" filter="url(#shadowOrder)"/>
  <rect x="624" y="238" width="140" height="110" rx="10" fill="#F0FDF4"/>
  <text x="682" y="305" font-family="Arial, sans-serif" font-size="36" fill="#22C55E">🥚</text>
  <text x="624" y="375" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">Free-Range Eggs</text>
  <text x="624" y="395" font-family="Arial, sans-serif" font-size="12" fill="#64748B">12 pack</text>
  <text x="624" y="420" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#16A34A">$5.99</text>
  <rect x="724" y="410" width="40" height="28" rx="14" fill="#22C55E"/>
  <text x="734" y="430" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">+</text>
</svg>