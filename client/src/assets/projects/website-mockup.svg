<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#0284C7"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
    <linearGradient id="hero1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00000033"/>
    </filter>
    <filter id="shadowSmall">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#E2E8F0" rx="12"/>
  <!-- Browser chrome -->
  <rect x="0" y="0" width="800" height="40" fill="#1E293B" rx="12"/>
  <rect x="0" y="24" width="800" height="16" fill="#1E293B"/>
  <circle cx="20" cy="20" r="6" fill="#EF4444"/>
  <circle cx="40" cy="20" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="20" r="6" fill="#22C55E"/>
  <rect x="90" y="14" width="260" height="12" rx="6" fill="#334155"/>
  <rect x="360" y="14" width="40" height="12" rx="4" fill="#334155"/>
  <!-- Hero section -->
  <rect x="0" y="40" width="800" height="240" fill="url(#hero1)"/>
  <text x="60" y="100" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">Build Amazing Products</text>
  <text x="60" y="132" font-family="Arial, sans-serif" font-size="16" fill="#94A3B8">Modern web solutions for forward-thinking companies</text>
  <rect x="60" y="155" width="160" height="44" rx="22" fill="url(#bg1)" filter="url(#shadowSmall)"/>
  <text x="105" y="183" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Get Started</text>
  <rect x="235" y="155" width="160" height="44" rx="22" fill="none" stroke="#334155" stroke-width="2"/>
  <text x="280" y="183" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#94A3B8">Learn More</text>
  <!-- Feature cards -->
  <rect x="30" y="300" width="230" height="175" rx="12" fill="url(#card1)" filter="url(#shadow1)"/>
  <rect x="55" y="320" width="40" height="40" rx="10" fill="#0EA5E9"/>
  <text x="63" y="346" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">⚡</text>
  <text x="55" y="385" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Lightning Fast</text>
  <text x="55" y="405" font-family="Arial, sans-serif" font-size="13" fill="#64748B">Optimized for speed and performance at every level</text>
  <rect x="285" y="300" width="230" height="175" rx="12" fill="url(#card1)" filter="url(#shadow1)"/>
  <rect x="310" y="320" width="40" height="40" rx="10" fill="#0EA5E9"/>
  <text x="318" y="346" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">🔒</text>
  <text x="310" y="385" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Secure Platform</text>
  <text x="310" y="405" font-family="Arial, sans-serif" font-size="13" fill="#64748B">Enterprise-grade security with end-to-end encryption</text>
  <rect x="540" y="300" width="230" height="175" rx="12" fill="url(#card1)" filter="url(#shadow1)"/>
  <rect x="565" y="320" width="40" height="40" rx="10" fill="#0EA5E9"/>
  <text x="573" y="346" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">📱</text>
  <text x="565" y="385" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Responsive Design</text>
  <text x="565" y="405" font-family="Arial, sans-serif" font-size="13" fill="#64748B">Flawless experience across all devices</text>
</svg>