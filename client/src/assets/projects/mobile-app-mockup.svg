<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgphone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="30%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F0A2E"/>
    </linearGradient>
    <linearGradient id="cardPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="100%" stop-color="#1E0A4A"/>
    </linearGradient>
    <linearGradient id="featureP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <filter id="shadowPhone">
      <feDropShadow dx="8" dy="12" stdDeviation="24" flood-color="#00000050"/>
    </filter>
    <filter id="shadowCard">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000040"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#F5F3FF" rx="12"/>
  <text x="200" y="55" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E1B4B">TaskFlow Mobile</text>
  <text x="200" y="78" font-family="Arial, sans-serif" font-size="14" fill="#7C3AED">Your personal productivity assistant</text>
  <!-- Phone frame -->
  <rect x="40" y="60" width="280" height="520" rx="36" fill="#1C1C1E" filter="url(#shadowPhone)"/>
  <rect x="48" y="68" width="264" height="504" rx="30" fill="url(#phoneGrad)"/>
  <!-- Notch -->
  <rect x="140" y="76" width="80" height="6" rx="3" fill="#1C1C1E"/>
  <!-- Status bar -->
  <text x="62" y="102" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#A78BFA">9:41</text>
  <text x="270" y="102" font-family="Arial, sans-serif" font-size="12" fill="#A78BFA">📶 🔋</text>
  <!-- App header -->
  <rect x="62" y="116" width="236" height="44" rx="12" fill="url(#featureP)"/>
  <text x="75" y="142" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">My Tasks</text>
  <text x="260" y="142" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">+</text>
  <!-- Search bar -->
  <rect x="62" y="168" width="236" height="36" rx="10" fill="#2E1065"/>
  <text x="80" y="192" font-family="Arial, sans-serif" font-size="13" fill="#8B5CF6">🔍 Search tasks...</text>
  <!-- Task cards -->
  <rect x="62" y="215" width="236" height="60" rx="12" fill="#2E1065" filter="url(#shadowCard)"/>
  <rect x="72" y="228" width="16" height="16" rx="8" fill="#22C55E"/>
  <text x="96" y="242" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Design sprint review</text>
  <text x="96" y="258" font-family="Arial, sans-serif" font-size="11" fill="#8B5CF6">Today, 2:00 PM</text>
  <text x="270" y="242" font-family="Arial, sans-serif" font-size="12" fill="#A78BFA">✨</text>

  <rect x="62" y="283" width="236" height="60" rx="12" fill="#2E1065" filter="url(#shadowCard)"/>
  <rect x="72" y="296" width="16" height="16" rx="4" fill="#F59E0B"/>
  <text x="96" y="310" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Update app prototype</text>
  <text x="96" y="326" font-family="Arial, sans-serif" font-size="11" fill="#8B5CF6">Tomorrow, 10:00 AM</text>
  <text x="270" y="310" font-family="Arial, sans-serif" font-size="12" fill="#A78BFA">📎</text>

  <rect x="62" y="351" width="236" height="60" rx="12" fill="#2E1065" filter="url(#shadowCard)"/>
  <rect x="72" y="364" width="16" height="16" rx="8" fill="#EF4444"/>
  <text x="96" y="378" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Team sync meeting</text>
  <text x="96" y="394" font-family="Arial, sans-serif" font-size="11" fill="#8B5CF6">Wed, 3:30 PM</text>
  <text x="270" y="378" font-family="Arial, sans-serif" font-size="12" fill="#A78BFA">👥</text>

  <!-- Progress card -->
  <rect x="62" y="422" width="236" height="80" rx="12" fill="url(#cardPurple)" filter="url(#shadowCard)"/>
  <text x="75" y="445" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#A78BFA">Weekly Progress</text>
  <text x="75" y="468" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">78%</text>
  <rect x="75" y="485" width="180" height="6" rx="3" fill="#1E1B4B"/>
  <rect x="75" y="485" width="140" height="6" rx="3" fill="#8B5CF6"/>
  <!-- Bottom nav -->
  <rect x="62" y="518" width="236" height="44" rx="12" fill="#1E1B4B"/>
  <text x="80" y="546" font-family="Arial, sans-serif" font-size="18" fill="#8B5CF6">🏠</text>
  <text x="130" y="546" font-family="Arial, sans-serif" font-size="18" fill="#4C1D95">📋</text>
  <text x="180" y="546" font-family="Arial, sans-serif" font-size="18" fill="#4C1D95">📊</text>
  <text x="230" y="546" font-family="Arial, sans-serif" font-size="18" fill="#4C1D95">👤</text>

  <!-- Feature highlights on the right -->
  <rect x="380" y="80" width="170" height="110" rx="14" fill="#ffffff" filter="url(#shadowCard)"/>
  <rect x="400" y="100" width="40" height="40" rx="10" fill="#EDE9FE"/>
  <text x="408" y="128" font-family="Arial, sans-serif" font-size="24" fill="#8B5CF6">✓</text>
  <text x="400" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E1B4B">Smart Organization</text>
  <text x="400" y="182" font-family="Arial, sans-serif" font-size="12" fill="#64748B">AI-powered task sorting</text>

  <rect x="570" y="80" width="170" height="110" rx="14" fill="#ffffff" filter="url(#shadowCard)"/>
  <rect x="590" y="100" width="40" height="40" rx="10" fill="#EDE9FE"/>
  <text x="598" y="128" font-family="Arial, sans-serif" font-size="24" fill="#8B5CF6">⏰</text>
  <text x="590" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E1B4B">Smart Reminders</text>
  <text x="590" y="182" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Never miss a deadline</text>

  <rect x="380" y="210" width="170" height="110" rx="14" fill="#ffffff" filter="url(#shadowCard)"/>
  <rect x="400" y="230" width="40" height="40" rx="10" fill="#EDE9FE"/>
  <text x="408" y="258" font-family="Arial, sans-serif" font-size="24" fill="#8B5CF6">👥</text>
  <text x="400" y="295" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E1B4B">Team Collaboration</text>
  <text x="400" y="312" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Work together in real-time</text>

  <rect x="570" y="210" width="170" height="110" rx="14" fill="#ffffff" filter="url(#shadowCard)"/>
  <rect x="590" y="230" width="40" height="40" rx="10" fill="#EDE9FE"/>
  <text x="598" y="258" font-family="Arial, sans-serif" font-size="24" fill="#8B5CF6">📊</text>
  <text x="590" y="295" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E1B4B">Analytics</text>
  <text x="590" y="312" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Track your productivity</text>

  <!-- Download buttons -->
  <rect x="380" y="355" width="360" height="50" rx="12" fill="#1E1B4B" filter="url(#shadowCard)"/>
  <text x="420" y="385" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">📱  Download on the App Store</text>

  <rect x="380" y="415" width="360" height="50" rx="12" fill="#1E1B4B" filter="url(#shadowCard)"/>
  <text x="420" y="445" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">▶  Get it on Google Play</text>

  <rect x="380" y="490" width="360" height="70" rx="14" fill="url(#featureP)" filter="url(#shadowCard)"/>
  <text x="400" y="520" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">⭐ 4.8/5 from 10,000+ reviews</text>
  <text x="400" y="540" font-family="Arial, sans-serif" font-size="12" fill="#C4B5FD">Most downloaded productivity app 2024</text>
</svg>