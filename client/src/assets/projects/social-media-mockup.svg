  <text x="260" y="440" font-family="Arial, sans-serif" font-size="12" fill="#64748B">❤️ 567</text>
  <text x="350" y="440" font-family="Arial, sans-serif" font-size="12" fill="#64748B">💬 42</text>
  <text x="440" y="440" font-family="Arial, sans-serif" font-size="12" fill="#64748B">↗️ 128</text>
