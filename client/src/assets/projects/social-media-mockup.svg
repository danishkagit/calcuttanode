  <circle cx="435" cy="85" r="20" fill="#ffffff"/>
  <circle cx="435" cy="85" r="18" fill="#FDF2F8"/>
  <text x="429" y="90" font-family="Arial, sans-serif" font-size="14" fill="#EC4899">👤</text>
  <text x="425" y="120" font-family="Arial, sans-serif" font-size="10" fill="#1E293B">Emma</text>

