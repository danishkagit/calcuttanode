  <text x="260" y="318" font-family="Arial, sans-serif" font-size="12" fill="#64748B">❤️ 234</text>
  <text x="350" y="318" font-family="Arial, sans-serif" font-size="12" fill="#64748B">💬 18</text>
  <text x="440" y="318" font-family="Arial, sans-serif" font-size="12" fill="#64748B">↗️ 45</text>

  <!-- Post 2 -->
