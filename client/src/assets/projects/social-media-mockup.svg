  <circle cx="260" cy="365" r="16" fill="#A855F7"/>
  <text x="254" y="370" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">E</text>
  <text x="284" y="370" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">Emma Williams</text>
  <text x="284" y="383" font-family="Arial, sans-serif" font-size="11" fill="#64748B">4h ago</text>
  <text x="250" y="408" font-family="Arial, sans-serif" font-size="13" fill="#334155">Great design thinking session today! Here are some key takeaways from our workshop about user-centered design. 🎨</text>
