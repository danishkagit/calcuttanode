  <text x="95" y="308" font-family="Arial, sans-serif" font-size="32" fill="#EC4899">💇‍♀️</text>
  <text x="35" y="378" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E293B">Hair Styling</text>
  <text x="35" y="396" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Cut, color &amp; styling</text>
