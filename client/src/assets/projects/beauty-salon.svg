<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgBeauty" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="30%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
    <linearGradient id="beautyLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDF2F8"/>
      <stop offset="100%" stop-color="#FCE7F3"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF2F8"/>
      <stop offset="100%" stop-color="#FCE7F3"/>
    </linearGradient>
    <linearGradient id="serviceCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#FFF1F2"/>
    </linearGradient>
    <filter id="shadowBeauty">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00000025"/>
    </filter>
    <filter id="shadowBeautySm">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#00000015"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#FFF1F2" rx="12"/>
  <!-- Browser chrome -->
  <rect x="0" y="0" width="800" height="40" fill="#1E293B" rx="12"/>
  <rect x="0" y="24" width="800" height="16" fill="#1E293B"/>
  <circle cx="20" cy="20" r="6" fill="#EF4444"/>
  <circle cx="40" cy="20" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="20" r="6" fill="#22C55E"/>

  <!-- Nav bar -->
  <rect x="0" y="40" width="800" height="65" fill="#ffffff" filter="url(#shadowBeautySm)"/>
  <text x="30" y="80" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#DB2777">Glam Studio ✨</text>
  <text x="420" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#DB2777">Home</text>
  <text x="475" y="78" font-family="Arial, sans-serif" font-size="14" fill="#64748B">Services</text>
  <text x="545" y="78" font-family="Arial, sans-serif" font-size="14" fill="#64748B">Gallery</text>
  <text x="610" y="78" font-family="Arial, sans-serif" font-size="14" fill="#64748B">About</text>
  <rect x="660" y="56" width="110" height="32" rx="16" fill="url(#bgBeauty)"/>
  <text x="690" y="77" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Book Now</text>

  <!-- Hero -->
  <rect x="0" y="105" width="800" height="110" fill="url(#bgBeauty)"/>
  <text x="30" y="150" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff">Where Beauty Meets Elegance 💅</text>
  <text x="30" y="180" font-family="Arial, sans-serif" font-size="14" fill="#FCE7F3">Premium beauty treatments in a luxurious atmosphere</text>
  <rect x="580" y="130" width="190" height="44" rx="22" fill="#ffffff" filter="url(#shadowBeautySm)"/>
  <text x="615" y="158" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#DB2777">Explore Services →</text>

