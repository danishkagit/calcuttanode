  <text x="233" y="378" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E293B">Nail Art</text>
  <text x="233" y="396" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Gel, acrylic &amp; design</text>
  <text x="233" y="420" font-family="Arial, sans-serif" font-size="13" fill="#64748B">⏱ 60 min • $45+</text>
  <rect x="233" y="438" width="155" height="28" rx="14" fill="#FCE7F3"/>
  <text x="283" y="458" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#DB2777">Book →</text>

  <rect x="416" y="230" width="185" height="245" rx="14" fill="url(#serviceCard)" filter="url(#shadowBeauty)"/>
  <rect x="431" y="248" width="155" height="100" rx="10" fill="#FCE7F3"/>
  <text x="490" y="308" font-family="Arial, sans-serif" font-size="32" fill="#EC4899">💆‍♀️</text>
  <text x="431" y="378" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E293B">Facial &amp; Spa</text>
  <text x="431" y="396" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Glow &amp; rejuvenation</text>
  <text x="431" y="420" font-family="Arial, sans-serif" font-size="13" fill="#64748B">⏱ 75 min • $85+</text>
  <rect x="431" y="438" width="155" height="28" rx="14" fill="#FCE7F3"/>
  <text x="481" y="458" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#DB2777">Book →</text>

  <rect x="614" y="230" width="165" height="245" rx="14" fill="url(#serviceCard)" filter="url(#shadowBeauty)"/>
  <rect x="629" y="248" width="135" height="100" rx="10" fill="#FCE7F3"/>
  <text x="690" y="308" font-family="Arial, sans-serif" font-size="32" fill="#EC4899">💄</text>
  <text x="629" y="378" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E293B">Makeup</text>
  <text x="629" y="396" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Bridal &amp; occasion</text>
  <text x="629" y="420" font-family="Arial, sans-serif" font-size="13" fill="#64748B">⏱ 60 min • $75+</text>
  <rect x="629" y="438" width="135" height="28" rx="14" fill="#FCE7F3"/>
  <text x="674" y="458" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#DB2777">Book →</text>
