<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgDash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="dashGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="greenAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B98133"/>
      <stop offset="100%" stop-color="#10B98100"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="shadowDash">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00000040"/>
    </filter>
    <filter id="shadowDashSm">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000030"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#F0FDF4" rx="12"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="200" height="500" fill="url(#dashGrad)" rx="12"/>
  <rect x="0" y="24" width="200" height="16" fill="url(#dashGrad)"/>
  <text x="25" y="45" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#10B981">Analytix</text>
  <rect x="20" y="70" width="160" height="40" rx="8" fill="#10B98120"/>
  <text x="40" y="96" font-family="Arial, sans-serif" font-size="14" fill="#10B981">📊 Dashboard</text>
  <text x="40" y="140" font-family="Arial, sans-serif" font-size="14" fill="#64748B">📈 Analytics</text>
  <text x="40" y="175" font-family="Arial, sans-serif" font-size="14" fill="#64748B">📦 Orders</text>
  <text x="40" y="210" font-family="Arial, sans-serif" font-size="14" fill="#64748B">👥 Customers</text>
  <text x="40" y="245" font-family="Arial, sans-serif" font-size="14" fill="#64748B">⚙ Settings</text>
  <!-- User profile at bottom of sidebar -->
  <rect x="20" y="420" width="160" height="50" rx="10" fill="#1E293B"/>
  <circle cx="45" cy="445" r="16" fill="#10B981"/>
  <text x="38" y="450" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">JD</text>
  <text x="68" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">John Doe</text>
  <text x="68" y="456" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Admin</text>

  <!-- Top bar -->
  <rect x="200" y="0" width="600" height="60" fill="#ffffff" filter="url(#shadowDashSm)"/>
  <text x="225" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0F172A">Welcome back, John 👋</text>
  <rect x="680" y="16" width="100" height="28" rx="14" fill="#10B981"/>
  <text x="695" y="35" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">+ New Report</text>

  <!-- KPI cards -->
  <rect x="220" y="80" width="135" height="90" rx="12" fill="#ffffff" filter="url(#shadowDash)"/>
  <text x="235" y="108" font-family="Arial, sans-serif" font-size="13" fill="#64748B">Total Revenue</text>
  <text x="235" y="140" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0F172A">$48,290</text>
  <text x="235" y="158" font-family="Arial, sans-serif" font-size="12" fill="#10B981">↑ 12.5%</text>

  <rect x="370" y="80" width="135" height="90" rx="12" fill="#ffffff" filter="url(#shadowDash)"/>
  <text x="385" y="108" font-family="Arial, sans-serif" font-size="13" fill="#64748B">Active Users</text>
  <text x="385" y="140" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0F172A">2,847</text>
  <text x="385" y="158" font-family="Arial, sans-serif" font-size="12" fill="#10B981">↑ 8.2%</text>

  <rect x="520" y="80" width="135" height="90" rx="12" fill="#ffffff" filter="url(#shadowDash)"/>
  <text x="535" y="108" font-family="Arial, sans-serif" font-size="13" fill="#64748B">Orders</text>
  <text x="535" y="140" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0F172A">1,426</text>
  <text x="535" y="158" font-family="Arial, sans-serif" font-size="12" fill="#EF4444">↓ 3.1%</text>

  <rect x="670" y="80" width="115" height="90" rx="12" fill="#ffffff" filter="url(#shadowDash)"/>
  <text x="685" y="108" font-family="Arial, sans-serif" font-size="13" fill="#64748B">Conversion</text>
  <text x="685" y="140" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0F172A">3.2%</text>
  <text x="685" y="158" font-family="Arial, sans-serif" font-size="12" fill="#10B981">↑ 1.4%</text>

  <!-- Chart -->
  <rect x="220" y="190" width="370" height="200" rx="12" fill="#ffffff" filter="url(#shadowDash)"/>
  <text x="240" y="218" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0F172A">Revenue Overview</text>
  <rect x="240" y="230" width="330" height="140" rx="8" fill="#F0FDF4"/>
  <!-- Chart bars -->
  <rect x="260" y="330" width="20" height="30" rx="4" fill="#10B98160"/>
  <rect x="295" y="310" width="20" height="50" rx="4" fill="#10B98160"/>
  <rect x="330" y="280" width="20" height="80" rx="4" fill="#10B98180"/>
  <rect x="365" y="260" width="20" height="100" rx="4" fill="#10B981"/>
  <rect x="400" y="270" width="20" height="90" rx="4" fill="#10B98180"/>
  <rect x="435" y="290" width="20" height="70" rx="4" fill="#10B98160"/>
  <rect x="470" y="300" width="20" height="60" rx="4" fill="#10B98160"/>
  <rect x="505" y="250" width="20" height="110" rx="4" fill="#10B981"/>
  <text x="260" y="360" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">Jan</text>
  <text x="295" y="360" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">Feb</text>
  <text x="330" y="360" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">Mar</text>
  <text x="365" y="360" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">Apr</text>
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">May</text>
  <text x="435" y="360" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">Jun</text>
  <text x="468" y="360" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">Jul</text>
  <text x="503" y="360" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">Aug</text>
  <!-- Chart line overlay -->
  <polyline points="270,320 305,300 340,270 375,250 410,260 445,280 480,290 515,240" fill="none" stroke="#10B981" stroke-width="2"/>

  <!-- Recent Orders sidebar -->
  <rect x="605" y="190" width="180" height="285" rx="12" fill="#ffffff" filter="url(#shadowDash)"/>
  <text x="620" y="218" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0F172A">Recent Orders</text>
  <rect x="615" y="232" width="160" height="45" rx="8" fill="#F8FAFC"/>
  <text x="622" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0F172A">Wireless Headphones</text>
  <text x="622" y="265" font-family="Arial, sans-serif" font-size="10" fill="#10B981">Completed</text>
  <rect x="615" y="282" width="160" height="45" rx="8" fill="#F8FAFC"/>
  <text x="622" y="300" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0F172A">Smart Watch Pro</text>
  <text x="622" y="315" font-family="Arial, sans-serif" font-size="10" fill="#F59E0B">Processing</text>
  <rect x="615" y="332" width="160" height="45" rx="8" fill="#F8FAFC"/>
  <text x="622" y="350" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0F172A">Bluetooth Speaker</text>
  <text x="622" y="365" font-family="Arial, sans-serif" font-size="10" fill="#F59E0B">Processing</text>
  <rect x="615" y="382" width="160" height="45" rx="8" fill="#F8FAFC"/>
  <text x="622" y="400" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0F172A">Digital Camera</text>
  <text x="622" y="415" font-family="Arial, sans-serif" font-size="10" fill="#10B981">Completed</text>
  <rect x="615" y="432" width="160" height="30" rx="8" fill="url(#greenAccent)"/>
  <text x="665" y="452" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">View All →</text>
</svg>