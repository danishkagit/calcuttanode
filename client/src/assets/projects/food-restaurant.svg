<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgFood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="50%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <linearGradient id="foodWarm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1C1917"/>
      <stop offset="100%" stop-color="#0C0A09"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="foodCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#FEF2F2"/>
    </linearGradient>
    <filter id="shadowFood">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00000030"/>
    </filter>
    <filter id="shadowFoodSm">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#FEF2F2" rx="12"/>
  <!-- Browser chrome -->
  <rect x="0" y="0" width="800" height="40" fill="#1E293B" rx="12"/>
  <rect x="0" y="24" width="800" height="16" fill="#1E293B"/>
  <circle cx="20" cy="20" r="6" fill="#EF4444"/>
  <circle cx="40" cy="20" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="20" r="6" fill="#22C55E"/>
  <rect x="90" y="14" width="260" height="12" rx="6" fill="#334155"/>

  <!-- Nav -->
  <rect x="0" y="40" width="800" height="60" fill="#ffffff" filter="url(#shadowFoodSm)"/>
  <text x="30" y="80" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#EF4444">La Pergola</text>
  <text x="480" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#EF4444">Menu</text>
  <text x="535" y="78" font-family="Arial, sans-serif" font-size="14" fill="#64748B">Reserve</text>
  <text x="600" y="78" font-family="Arial, sans-serif" font-size="14" fill="#64748B">Events</text>
  <text x="660" y="78" font-family="Arial, sans-serif" font-size="14" fill="#64748B">Contact</text>

  <!-- Hero -->
  <rect x="0" y="100" width="800" height="130" fill="url(#foodWarm)"/>
  <text x="40" y="145" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">Authentic Italian Cuisine 🇮🇹</text>
  <text x="40" y="175" font-family="Arial, sans-serif" font-size="15" fill="#A8A29E">Experience the taste of Italy with our handcrafted pasta and wood-fired pizzas</text>
  <text x="40" y="200" font-family="Arial, sans-serif" font-size="13" fill="#EF4444">★ 4.8/5 | Open daily 11am - 11pm</text>
  <rect x="580" y="140" width="180" height="44" rx="22" fill="url(#bgFood)" filter="url(#shadowFoodSm)"/>
  <text x="625" y="168" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Reserve a Table →</text>

  <!-- Category tabs -->
  <rect x="20" y="245" width="100" height="35" rx="18" fill="url(#bgFood)"/>
  <text x="43" y="268" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">All</text>
  <rect x="130" y="245" width="110" height="35" rx="18" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="153" y="268" font-family="Arial, sans-serif" font-size="12" fill="#EF4444">🍝 Pasta</text>
  <rect x="250" y="245" width="110" height="35" rx="18" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="273" y="268" font-family="Arial, sans-serif" font-size="12" fill="#EF4444">🍕 Pizza</text>
  <rect x="370" y="245" width="120" height="35" rx="18" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="393" y="268" font-family="Arial, sans-serif" font-size="12" fill="#EF4444">🥗 Salads</text>
  <rect x="500" y="245" width="120" height="35" rx="18" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="523" y="268" font-family="Arial, sans-serif" font-size="12" fill="#EF4444">🍰 Desserts</text>

  <!-- Menu grid -->
  <rect x="20" y="295" width="185" height="180" rx="14" fill="url(#foodCard)" filter="url(#shadowFood)"/>
  <rect x="35" y="310" width="155" height="90" rx="8" fill="#FEE2E2"/>
  <text x="95" y="360" font-family="Arial, sans-serif" font-size="28" fill="#EF4444">🍝</text>
  <text x="35" y="425" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1C1917">Spaghetti Carbonara</text>
  <text x="35" y="443" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Creamy, pancetta, parmesan</text>
  <text x="35" y="465" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#EF4444">$18.99</text>

  <rect x="218" y="295" width="185" height="180" rx="14" fill="url(#foodCard)" filter="url(#shadowFood)"/>
  <rect x="233" y="310" width="155" height="90" rx="8" fill="#FEE2E2"/>
  <text x="295" y="360" font-family="Arial, sans-serif" font-size="28" fill="#EF4444">🍕</text>
  <text x="233" y="425" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1C1917">Margherita Pizza</text>
  <text x="233" y="443" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Fresh mozzarella, basil</text>
  <text x="233" y="465" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#EF4444">$22.99</text>

  <rect x="416" y="295" width="185" height="180" rx="14" fill="url(#foodCard)" filter="url(#shadowFood)"/>
  <rect x="431" y="310" width="155" height="90" rx="8" fill="#FEE2E2"/>
  <text x="495" y="360" font-family="Arial, sans-serif" font-size="28" fill="#EF4444">🥗</text>
  <text x="431" y="425" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1C1917">Caesar Salad</text>
  <text x="431" y="443" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Grilled chicken, croutons</text>
  <text x="431" y="465" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#EF4444">$14.99</text>

  <rect x="614" y="295" width="165" height="180" rx="14" fill="url(#foodCard)" filter="url(#shadowFood)"/>
  <rect x="629" y="310" width="135" height="90" rx="8" fill="#FEE2E2"/>
  <text x="690" y="360" font-family="Arial, sans-serif" font-size="28" fill="#EF4444">🍰</text>
  <text x="629" y="425" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1C1917">Tiramisu</text>
  <text x="629" y="443" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Coffee, mascarpone</text>
  <text x="629" y="465" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#EF4444">$10.99</text>
</svg>