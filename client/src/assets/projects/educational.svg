  <text x="629" y="355" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">Mobile Dev</text>
  <text x="629" y="373" font-family="Arial, sans-serif" font-size="11" fill="#64748B">React Native &amp; Flutter</text>
