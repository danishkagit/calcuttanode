    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadowEdu">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00000025"/>
    </filter>
    <filter id="shadowEduSm">
