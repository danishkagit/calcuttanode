<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgDental" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="50%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="dentalLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0FDFA"/>
      <stop offset="100%" stop-color="#CCFBF1"/>
    </linearGradient>
    <linearGradient id="dentalCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <filter id="shadowDen">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00000025"/>
    </filter>
    <filter id="shadowDenSm">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#00000015"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#F0FDFA" rx="12"/>
  <!-- Browser chrome -->
  <rect x="0" y="0" width="800" height="40" fill="#1E293B" rx="12"/>
  <rect x="0" y="24" width="800" height="16" fill="#1E293B"/>
  <circle cx="20" cy="20" r="6" fill="#EF4444"/>
  <circle cx="40" cy="20" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="20" r="6" fill="#22C55E"/>

  <!-- Header -->
  <rect x="0" y="40" width="800" height="65" fill="#ffffff" filter="url(#shadowDenSm)"/>
  <text x="25" y="78" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0D9488">🦷 BrightSmile Dental</text>
  <text x="420" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0D9488">Home</text>
  <text x="475" y="78" font-family="Arial, sans-serif" font-size="14" fill="#64748B">Treatments</text>
  <text x="550" y="78" font-family="Arial, sans-serif" font-size="14" fill="#64748B">Team</text>
  <text x="610" y="78" font-family="Arial, sans-serif" font-size="14" fill="#64748B">Contact</text>
  <rect x="660" y="56" width="110" height="32" rx="16" fill="url(#bgDental)"/>
  <text x="688" y="77" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Book Now</text>

  <!-- Hero -->
  <rect x="0" y="105" width="800" height="110" fill="url(#bgDental)"/>
  <text x="30" y="150" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff">Your Smile, Our Passion 😁</text>
  <text x="30" y="178" font-family="Arial, sans-serif" font-size="14" fill="#CCFBF1">Advanced dental care in a comfortable, welcoming environment</text>
  <rect x="580" y="135" width="190" height="44" rx="22" fill="#ffffff" filter="url(#shadowDenSm)"/>
  <text x="615" y="163" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0D9488">Book Appointment →</text>

  <!-- Treatment cards -->
  <text x="25" y="245" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E293B">Our Treatments</text>

  <rect x="20" y="260" width="185" height="215" rx="14" fill="url(#dentalCard)" filter="url(#shadowDen)"/>
  <rect x="35" y="278" width="155" height="75" rx="10" fill="#F0FDFA"/>
  <text x="95" y="325" font-family="Arial, sans-serif" font-size="32" fill="#14B8A6">🦷</text>
  <text x="35" y="378" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">Teeth Whitening</text>
  <text x="35" y="396" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Professional-grade whitening for a brighter smile</text>
