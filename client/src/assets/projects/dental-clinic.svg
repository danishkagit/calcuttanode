  <text x="143" y="438" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0D9488">Book →</text>

  <rect x="218" y="260" width="185" height="215" rx="14" fill="url(#dentalCard)" filter="url(#shadowDen)"/>
  <rect x="233" y="278" width="155" height="75" rx="10" fill="#F0FDFA"/>
  <text x="293" y="325" font-family="Arial, sans-serif" font-size="32" fill="#14B8A6">😬</text>
  <text x="233" y="378" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">Braces &amp; Aligners</text>
  <text x="233" y="396" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Invisible aligners for a straight smile</text>
  <text x="233" y="425" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14B8A6">From $999</text>
  <rect x="328" y="418" width="60" height="28" rx="14" fill="#F0FDFA"/>
  <text x="341" y="438" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0D9488">Book →</text>

  <rect x="416" y="260" width="185" height="215" rx="14" fill="url(#dentalCard)" filter="url(#shadowDen)"/>
  <rect x="431" y="278" width="155" height="75" rx="10" fill="#F0FDFA"/>
  <text x="491" y="325" font-family="Arial, sans-serif" font-size="32" fill="#14B8A6">🦷</text>
  <text x="431" y="378" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">Dental Implants</text>
  <text x="431" y="396" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Permanent tooth replacement solutions</text>
  <text x="431" y="425" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14B8A6">From $1,499</text>
  <rect x="526" y="418" width="60" height="28" rx="14" fill="#F0FDFA"/>
  <text x="539" y="438" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0D9488">Book →</text>

  <rect x="614" y="260" width="165" height="215" rx="14" fill="url(#dentalCard)" filter="url(#shadowDen)"/>
  <rect x="629" y="278" width="135" height="75" rx="10" fill="#F0FDFA"/>
  <text x="690" y="325" font-family="Arial, sans-serif" font-size="32" fill="#14B8A6">🩺</text>
  <text x="629" y="378" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">Checkup</text>
  <text x="629" y="396" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Regular exam &amp; clean</text>
  <text x="629" y="425" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14B8A6">$79</text>
  <rect x="724" y="418" width="40" height="28" rx="14" fill="#F0FDFA"/>
  <text x="734" y="438" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0D9488">→</text>
</svg>