<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="lp1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <linearGradient id="lp2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6B325"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="lp-glow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#E6B325" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="160" height="160" rx="36" fill="url(#lp1)"/>
  <!-- Lion head - mane -->
  <circle cx="100" cy="92" r="48" fill="url(#lp2)" filter="url(#lp-glow)"/>
  <!-- Inner face -->
  <circle cx="100" cy="92" r="30" fill="#1A1A2E"/>
  <!-- Eyes -->
  <ellipse cx="86" cy="85" rx="6" ry="5" fill="#E6B325"/>
  <ellipse cx="114" cy="85" rx="6" ry="5" fill="#E6B325"/>
  <circle cx="86" cy="85" r="2.5" fill="#1A1A2E"/>
  <circle cx="114" cy="85" r="2.5" fill="#1A1A2E"/>
  <!-- Nose -->
  <path d="M94 96 L100 102 L106 96 Z" fill="#E6B325"/>
  <!-- Mouth -->
  <path d="M94 104 Q100 110 106 104" fill="none" stroke="#E6B325" stroke-width="2" stroke-linecap="round"/>
  <!-- Mane spikes -->
  <polygon points="100,44 104,52 96,52" fill="#B8860B" opacity="0.7"/>
  <polygon points="100,140 104,132 96,132" fill="#B8860B" opacity="0.7"/>
  <polygon points="52,88 60,92 60,84" fill="#B8860B" opacity="0.7"/>
  <polygon points="148,88 140,92 140,84" fill="#B8860B" opacity="0.7"/>
</svg>