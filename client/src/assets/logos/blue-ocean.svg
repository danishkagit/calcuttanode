<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bo1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0077B6"/>
      <stop offset="100%" stop-color="#023E8A"/>
    </linearGradient>
    <linearGradient id="bo2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#0096C7"/>
    </linearGradient>
    <filter id="bo-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#012A5E" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="160" height="160" rx="36" fill="url(#bo1)"/>
  <!-- Circular water ring -->
  <ellipse cx="100" cy="100" rx="60" ry="24" fill="none" stroke="#CAF0F8" stroke-width="3" opacity="0.4"/>
  <ellipse cx="100" cy="100" rx="46" ry="18" fill="none" stroke="#CAF0F8" stroke-width="2.5" opacity="0.5"/>
  <!-- Diving figure -->
  <path d="M80 68 Q96 60 112 72 Q120 80 116 90 Q112 96 104 96" fill="none" stroke="#CAF0F8" stroke-width="5" stroke-linecap="round" filter="url(#bo-shadow)"/>
  <!-- Bubble trail -->
  <circle cx="72" cy="78" r="3" fill="#90E0EF" opacity="0.6"/>
  <circle cx="64" cy="86" r="2" fill="#90E0EF" opacity="0.4"/>
  <circle cx="58" cy="92" r="1.5" fill="#90E0EF" opacity="0.3"/>
  <!-- Diver arms -->
  <path d="M96 72 Q88 60 80 58" fill="none" stroke="#CAF0F8" stroke-width="4" stroke-linecap="round"/>
  <path d="M108 76 Q118 68 124 64" fill="none" stroke="#CAF0F8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="100" r="15" fill="none" stroke="#00B4D8" stroke-width="2" opacity="0.3"/>
</svg>