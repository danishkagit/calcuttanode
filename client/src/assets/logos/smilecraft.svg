<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="sc1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="sc2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
    <filter id="sc-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0D47A1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="160" height="160" rx="36" fill="url(#sc1)"/>
  <!-- Smile face circle -->
  <circle cx="100" cy="96" r="44" fill="#E3F2FD" opacity="0.95" filter="url(#sc-shadow)"/>
  <!-- Eyes -->
  <circle cx="82" cy="84" r="5" fill="#1565C0"/>
  <circle cx="118" cy="84" r="5" fill="#1565C0"/>
  <circle cx="83" cy="83" r="2" fill="#FFF"/>
  <circle cx="119" cy="83" r="2" fill="#FFF"/>
  <!-- Smile -->
  <path d="M76 104 Q100 126 124 104" fill="none" stroke="#1565C0" stroke-width="4" stroke-linecap="round"/>
  <!-- Tooth accent -->
  <rect x="96" y="106" width="8" height="10" rx="2" fill="url(#sc2)"/>
  <!-- Sparkle -->
  <circle cx="136" cy="76" r="3" fill="#FFC107" opacity="0.8"/>
  <circle cx="62" cy="72" r="2" fill="#FFC107" opacity="0.6"/>
</svg>