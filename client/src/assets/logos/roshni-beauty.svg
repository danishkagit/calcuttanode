<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="rb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E84393"/>
      <stop offset="100%" stop-color="#C2185B"/>
    </linearGradient>
    <linearGradient id="rb2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F06292"/>
      <stop offset="100%" stop-color="#E84393"/>
    </linearGradient>
    <filter id="rb-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#8B0A50" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="160" height="160" rx="40" fill="url(#rb1)"/>
  <!-- Hand mirror -->
  <ellipse cx="100" cy="78" rx="32" ry="36" fill="#FCE4EC" opacity="0.95" filter="url(#rb-shadow)"/>
  <ellipse cx="100" cy="78" rx="24" ry="28" fill="#F48FB1" opacity="0.4"/>
  <!-- Mirror handle -->
  <rect x="95" y="112" width="10" height="30" rx="5" fill="#FCE4EC"/>
  <ellipse cx="100" cy="142" rx="8" ry="5" fill="#FCE4EC"/>
  <!-- Star sparkles -->
  <circle cx="74" cy="60" r="2.5" fill="#FFF" opacity="0.8"/>
  <circle cx="128" cy="68" r="2" fill="#FFF" opacity="0.6"/>
  <circle cx="82" cy="104" r="1.5" fill="#FFF" opacity="0.5"/>
  <circle cx="120" cy="95" r="2" fill="#FFF" opacity="0.7"/>
</svg>