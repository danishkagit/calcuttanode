<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cv1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="cv2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D84315"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <filter id="cv-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1B5E20" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="160" height="160" rx="36" fill="url(#cv1)"/>
  <!-- House shape -->
  <polygon points="100,44 46,84 46,150 154,150 154,84" fill="#E8F5E9" opacity="0.95" filter="url(#cv-shadow)"/>
  <!-- Roof -->
  <polygon points="100,36 40,84 160,84" fill="url(#cv2)"/>
  <!-- Door -->
  <rect x="88" y="108" width="24" height="42" rx="4" fill="#A5D6A7"/>
  <!-- Window -->
  <rect x="58" y="96" width="20" height="20" rx="4" fill="#81C784"/>
  <rect x="122" y="96" width="20" height="20" rx="4" fill="#81C784"/>
  <!-- Leaf on roof -->
  <path d="M140 58 Q148 42 160 48 Q152 62 140 58 Z" fill="#66BB6A"/>
  <line x1="140" y1="58" x2="150" y2="50" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
</svg>