<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="oa1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D9970"/>
      <stop offset="100%" stop-color="#2A7B55"/>
    </linearGradient>
    <linearGradient id="oa2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF851B"/>
      <stop offset="100%" stop-color="#E06B00"/>
    </linearGradient>
    <filter id="oa-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1B5E20" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="160" height="160" rx="36" fill="url(#oa1)"/>
  <!-- Mountain -->
  <polygon points="30,140 100,44 170,140" fill="#E8F5E9" opacity="0.95" filter="url(#oa-shadow)"/>
  <!-- Snow cap -->
  <polygon points="100,44 86,64 100,58 114,64" fill="#FFF" opacity="0.9"/>
  <!-- Second mountain -->
  <polygon points="50,140 100,80 150,140" fill="#A5D6A7" opacity="0.6"/>
  <!-- Sun -->
  <circle cx="148" cy="52" r="18" fill="url(#oa2)" filter="url(#oa-shadow)"/>
  <!-- Sun rays -->
  <line x1="148" y1="28" x2="148" y2="22" stroke="url(#oa2)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="148" y1="76" x2="148" y2="82" stroke="url(#oa2)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="124" y1="52" x2="118" y2="52" stroke="url(#oa2)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="172" y1="52" x2="178" y2="52" stroke="url(#oa2)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Compass needle -->
  <circle cx="100" cy="128" r="10" fill="none" stroke="#3D9970" stroke-width="2" opacity="0.5"/>
  <polygon points="100,120 103,130 100,128 97,130" fill="#3D9970" opacity="0.6"/>
</svg>