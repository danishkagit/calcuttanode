<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="mp1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="mp2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <filter id="mp-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0A3D0A" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="160" height="160" rx="36" fill="url(#mp1)"/>
  <!-- Medical cross -->
  <rect x="72" y="58" width="56" height="16" rx="5" fill="#E8F5E9" opacity="0.95" filter="url(#mp-shadow)"/>
  <rect x="92" y="38" width="16" height="56" rx="5" fill="#E8F5E9" opacity="0.95" filter="url(#mp-shadow)"/>
  <rect x="72" y="86" width="16" height="56" rx="5" fill="#E8F5E9" opacity="0.95" filter="url(#mp-shadow)"/>
  <rect x="112" y="86" width="16" height="56" rx="5" fill="#E8F5E9" opacity="0.95" filter="url(#mp-shadow)"/>
  <!-- Pill accent -->
  <ellipse cx="100" cy="138" rx="12" ry="6" fill="url(#mp2)" filter="url(#mp-shadow)"/>
  <line x1="94" y1="138" x2="106" y2="138" stroke="#FFF" stroke-width="1.5" opacity="0.4"/>
  <!-- Cross center -->
  <circle cx="100" cy="66" r="4" fill="#FFF" opacity="0.8"/>
  <!-- Small plus accent -->
  <rect x="97" y="94" width="6" height="6" rx="1" fill="#FFF" opacity="0.3"/>
</svg>