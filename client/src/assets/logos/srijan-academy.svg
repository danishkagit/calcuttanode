<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="sa1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B6ABF"/>
      <stop offset="100%" stop-color="#3F4DB0"/>
    </linearGradient>
    <linearGradient id="sa2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9C6ADE"/>
      <stop offset="100%" stop-color="#7C4EC4"/>
    </linearGradient>
    <filter id="sa-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2A3580" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="160" height="160" rx="36" fill="url(#sa1)"/>
  <!-- Open book -->
  <path d="M50 55 L100 65 L150 55 L150 130 L100 145 L50 130 Z" fill="#E8EAF6" opacity="0.95" filter="url(#sa-shadow)"/>
  <!-- Book spine/center line -->
  <line x1="100" y1="65" x2="100" y2="145" stroke="url(#sa2)" stroke-width="3" stroke-linecap="round"/>
  <!-- Graduation cap on top -->
  <path d="M72 55 L100 40 L128 55 L100 68 Z" fill="url(#sa2)" filter="url(#sa-shadow)"/>
  <line x1="100" y1="40" x2="100" y2="32" stroke="url(#sa2)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="30" r="4" fill="url(#sa2)"/>
  <!-- Tassel -->
  <path d="M100 40 Q112 48 116 56" fill="none" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
</svg>