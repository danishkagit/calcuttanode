<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bv1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8BBD0"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
    <linearGradient id="bv2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <filter id="bv-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#AD1457" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="160" height="160" rx="40" fill="url(#bv1)"/>
  <!-- Diamond shape -->
  <polygon points="100,36 148,100 100,164 52,100" fill="#FCE4EC" opacity="0.95" filter="url(#bv-shadow)"/>
  <polygon points="100,56 132,100 100,144 68,100" fill="url(#bv2)" opacity="0.9"/>
  <!-- Inner flower -->
  <circle cx="100" cy="100" r="16" fill="#FFF" opacity="0.9"/>
  <path d="M100 88 Q108 92 112 100 Q108 108 100 112 Q92 108 88 100 Q92 92 100 88 Z" fill="#E91E63" opacity="0.5"/>
  <!-- Small petals -->
  <ellipse cx="100" cy="70" rx="5" ry="8" fill="#FFF" opacity="0.7" transform="rotate(0 100 100)"/>
  <ellipse cx="100" cy="70" rx="5" ry="8" fill="#FFF" opacity="0.7" transform="rotate(60 100 100)"/>
  <ellipse cx="100" cy="70" rx="5" ry="8" fill="#FFF" opacity="0.7" transform="rotate(120 100 100)"/>
  <ellipse cx="100" cy="70" rx="5" ry="8" fill="#FFF" opacity="0.7" transform="rotate(180 100 100)"/>
  <ellipse cx="100" cy="70" rx="5" ry="8" fill="#FFF" opacity="0.7" transform="rotate(240 100 100)"/>
  <ellipse cx="100" cy="70" rx="5" ry="8" fill="#FFF" opacity="0.7" transform="rotate(300 100 100)"/>
</svg>