<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="nt1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1B2838"/>
    </linearGradient>
    <linearGradient id="nt2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0099CC"/>
    </linearGradient>
    <filter id="nt-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#00D4FF" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="160" height="160" rx="32" fill="url(#nt1)"/>
  <!-- Hexagon -->
  <polygon points="100,38 148,62 148,138 100,162 52,138 52,62" fill="none" stroke="url(#nt2)" stroke-width="6" stroke-linejoin="round" filter="url(#nt-glow)"/>
  <!-- Inner tech elements -->
  <circle cx="100" cy="100" r="18" fill="none" stroke="#00D4FF" stroke-width="3" opacity="0.6"/>
  <circle cx="100" cy="100" r="8" fill="url(#nt2)"/>
  <!-- Circuit-like lines -->
  <line x1="100" y1="82" x2="100" y2="62" stroke="#00D4FF" stroke-width="2" opacity="0.4"/>
  <line x1="100" y1="118" x2="100" y2="138" stroke="#00D4FF" stroke-width="2" opacity="0.4"/>
  <line x1="82" y1="100" x2="62" y2="100" stroke="#00D4FF" stroke-width="2" opacity="0.4"/>
  <line x1="118" y1="100" x2="138" y2="100" stroke="#00D4FF" stroke-width="2" opacity="0.4"/>
</svg>