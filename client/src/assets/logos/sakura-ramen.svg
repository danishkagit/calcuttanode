<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="sr1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="sr2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <filter id="sr-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#7F0000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="160" height="160" rx="36" fill="url(#sr1)"/>
  <!-- Bowl -->
  <path d="M50 80 Q50 140 100 148 Q150 140 150 80 Z" fill="#FFF8E1" opacity="0.95" filter="url(#sr-shadow)"/>
