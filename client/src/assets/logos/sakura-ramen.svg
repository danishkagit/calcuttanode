  <!-- Bowl rim -->
  <ellipse cx="100" cy="80" rx="50" ry="10" fill="none" stroke="#FFECB3" stroke-width="2.5"/>
  <!-- Steam -->
  <path d="M72 68 Q68 54 74 44" fill="none" stroke="#FFCCBC" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M100 62 Q96 48 102 38" fill="none" stroke="#FFCCBC" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M128 68 Q124 54 130 44" fill="none" stroke="#FFCCBC" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Noodles -->
  <path d="M72 90 Q80 86 88 90 Q96 94 104 90 Q112 86 120 90" fill="none" stroke="#FFB74D" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <!-- Egg half -->
  <ellipse cx="90" cy="100" rx="8" ry="6" fill="#FFF9C4"/>
  <ellipse cx="90" cy="98" rx="4" ry="3" fill="#FFB300"/>
  <!-- Chopsticks -->
  <line x1="120" y1="62" x2="112" y2="130" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
  <line x1="134" y1="62" x2="126" y2="130" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
</svg>