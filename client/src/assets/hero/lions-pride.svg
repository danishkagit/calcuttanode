  </g>
  <g filter="url(#shadow)" transform="translate(270,240)">
    <rect x="0" y="0" width="260" height="280" rx="16" fill="#1A1A1A"/>
    <rect x="6" y="6" width="248" height="240" rx="12" fill="#FFF8E1"/>
