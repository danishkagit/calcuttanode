    <rect x="30" y="50" width="200" height="50" rx="4" fill="#FFD700" opacity="0.08"/>
    <rect x="30" y="115" width="200" height="6" rx="2" fill="#333" opacity="0.08"/>
    <rect x="30" y="128" width="160" height="4" rx="2" fill="#333" opacity="0.05"/>
    <rect x="30" y="145" width="200" height="6" rx="2" fill="#333" opacity="0.08"/>
    <rect x="30" y="158" width="140" height="4" rx="2" fill="#333" opacity="0.05"/>
  </g>
  <g transform="translate(580,100)" opacity="0.15">
