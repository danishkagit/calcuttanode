  <text x="400" y="70" font-family="Arial Black,sans-serif" font-size="32" font-weight="900" fill="#FFF" text-anchor="middle" filter="url(#glow)" opacity="0.12">LION'S PRIDE</text>
  <text x="400" y="555" font-family="Georgia,serif" font-size="22" fill="#FFD700" text-anchor="middle" opacity="0.35" letter-spacing="6" filter="url(#glow)">P U B</text>
  <text x="400" y="578" font-family="Arial,sans-serif" font-size="12" fill="#FFD54F" text-anchor="middle" opacity="0.25" letter-spacing="4">WHERE LEGENDS MEET</text>
