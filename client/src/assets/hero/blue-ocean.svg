<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001F3F"/>
      <stop offset="40%" stop-color="#003366"/>
      <stop offset="100%" stop-color="#0077BE"/>
    </linearGradient>
    <linearGradient id="ov" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#000B18" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="0.08"/>
