<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF4500"/>
      <stop offset="50%" stop-color="#FF6347"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="bg1b" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC143C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8DC" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFE4B5" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow1">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#8B0000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0E68C"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg1)"/>
  <rect width="800" height="600" fill="url(#bg1b)"/>
  <circle cx="100" cy="80" r="120" fill="#FFD700" opacity="0.12"/>
  <circle cx="700" cy="500" r="180" fill="#FF6347" opacity="0.15"/>
  <circle cx="650" cy="100" r="90" fill="#FF4500" opacity="0.2"/>
  <circle cx="150" cy="520" r="100" fill="#DC143C" opacity="0.1"/>
  <path d="M0,400 Q200,350 400,420 T800,380 L800,600 L0,600 Z" fill="#FF6347" opacity="0.15"/>
  <path d="M-50,450 Q150,380 350,460 T850,420 L850,600 L-50,600 Z" fill="#FF8C00" opacity="0.1"/>
  <!-- Plate/steam design -->
  <ellipse cx="400" cy="400" rx="120" ry="30" fill="url(#plate)" opacity="0.15" filter="url(#shadow1)"/>
  <ellipse cx="400" cy="398" rx="90" ry="20" fill="#FFF" opacity="0.1"/>
  <!-- Steam lines -->
  <path d="M360,360 Q370,330 360,300" stroke="#FFF" stroke-width="3" fill="none" opacity="0.3" filter="url(#glow1)"/>
  <path d="M390,350 Q400,320 390,290" stroke="#FFF" stroke-width="2.5" fill="none" opacity="0.25" filter="url(#glow1)"/>
  <path d="M420,355 Q430,325 420,295" stroke="#FFF" stroke-width="3" fill="none" opacity="0.3" filter="url(#glow1)"/>
  <!-- Device mockup - laptop -->
  <g filter="url(#shadow1)" transform="translate(140,100)">
    <rect x="0" y="0" width="520" height="320" rx="8" fill="#2C2C2C"/>
    <rect x="4" y="4" width="512" height="290" rx="4" fill="#FFF"/>
    <rect x="4" y="4" width="512" height="290" rx="4" fill="url(#bg1)" opacity="0.08"/>
    <rect x="200" y="298" width="120" height="4" rx="2" fill="#444"/>
    <rect x="0" y="320" width="520" height="18" rx="0 0 8 8" fill="#3C3C3C"/>
    <rect x="200" y="330" width="120" height="4" rx="2" fill="#555"/>
  </g>
  <!-- Kitchen element - whisk -->
  <g transform="translate(80,80)" opacity="0.2">
    <rect x="3" y="30" width="4" height="40" rx="2" fill="#FFF"/>
    <ellipse cx="5" cy="25" rx="8" ry="12" fill="none" stroke="#FFF" stroke-width="2"/>
  </g>
  <!-- Text design elements -->
  <text x="400" y="80" font-family="Arial Black,sans-serif" font-size="38" font-weight="900" fill="#FFF" text-anchor="middle" filter="url(#glow1)" opacity="0.15">M O U B A N I</text>
  <text x="400" y="530" font-family="Georgia,serif" font-size="22" fill="#FFF" text-anchor="middle" opacity="0.3" letter-spacing="6">KITCHEN</text>
  <text x="400" y="558" font-family="Arial,sans-serif" font-size="13" fill="#FFF" text-anchor="middle" opacity="0.2" letter-spacing="3">AUTHENTIC BENGALI CUISINE</text>
  <!-- Decorative dots -->
  <circle cx="300" cy="560" r="3" fill="#FFD700" opacity="0.4"/>
  <circle cx="324" cy="560" r="3" fill="#FFD700" opacity="0.3"/>
  <circle cx="348" cy="560" r="3" fill="#FFD700" opacity="0.4"/>
  <circle cx="452" cy="560" r="3" fill="#FFD700" opacity="0.4"/>
  <circle cx="476" cy="560" r="3" fill="#FFD700" opacity="0.3"/>
  <circle cx="500" cy="560" r="3" fill="#FFD700" opacity="0.4"/>
</svg>
