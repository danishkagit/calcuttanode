<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A0024"/>
      <stop offset="40%" stop-color="#880E4F"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="ov" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#2A0012" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FCE4EC" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="goldG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#2A0012" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
