<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="40%" stop-color="#F8BBD0"/>
      <stop offset="100%" stop-color="#D7CCC8"/>
    </linearGradient>
    <linearGradient id="ov" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E91E63" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#F8BBD0"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#880E4F" flood-opacity="0.15"/></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#ov)"/>
