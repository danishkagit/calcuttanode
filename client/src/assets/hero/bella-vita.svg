  <text x="400" y="70" font-family="Georgia,serif" font-size="36" font-weight="bold" font-style="italic" fill="#4A1528" text-anchor="middle" filter="url(#glow)" opacity="0.15">Bella Vita</text>
  <text x="400" y="555" font-family="Georgia,serif" font-size="22" fill="#4A1528" text-anchor="middle" opacity="0.25" letter-spacing="5">L U X U R Y</text>
  <text x="400" y="578" font-family="Arial,sans-serif" font-size="12" fill="#4A1528" text-anchor="middle" opacity="0.18" letter-spacing="4">LIVING THE BEAUTIFUL LIFE</text>
