  <path d="M0,380 Q200,340 400,400 T800,370 L800,600 L0,600 Z" fill="#FFF" opacity="0.08"/>
  <path d="M-50,430 Q250,380 500,450 T850,420 L850,600 Z" fill="#F8BBD0" opacity="0.06"/>
  <g transform="translate(400,160)" opacity="0.12">
