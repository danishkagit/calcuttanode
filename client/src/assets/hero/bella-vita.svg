    <path d="M-18,0 Q-5,10 0,5 Q5,10 18,0" fill="none" stroke="#E91E63" stroke-width="2"/>
  </g>
  <g filter="url(#shadow)" transform="translate(240,230)">
    <rect x="0" y="0" width="320" height="200" rx="10" fill="#3C2A33"/>
    <rect x="5" y="5" width="310" height="170" rx="6" fill="#FFF"/>
    <rect x="5" y="5" width="310" height="170" rx="6" fill="url(#bg)" opacity="0.1"/>
    <rect x="110" y="182" width="100" height="4" rx="2" fill="#444"/>
    <rect x="0" y="200" width="320" height="16" rx="0 0 10 10" fill="#4C3A43"/>
    <rect x="110" y="208" width="100" height="3" rx="1.5" fill="#666"/>
  </g>
  <g transform="translate(580,110)" opacity="0.12">
