<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0066CC"/>
      <stop offset="60%" stop-color="#0099FF"/>
      <stop offset="100%" stop-color="#00BFFF"/>
    </linearGradient>
    <linearGradient id="bg2b" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#003366" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E0F7FA" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E3F2FD" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#003366" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="cross" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg2)"/>
  <rect width="800" height="600" fill="url(#bg2b)"/>
  <!-- Abstract medical shapes -->
  <circle cx="80" cy="80" r="100" fill="#FFFFFF" opacity="0.06"/>
  <circle cx="720" cy="520" r="150" fill="#00BFFF" opacity="0.1"/>
  <circle cx="650" cy="80" r="70" fill="#0099FF" opacity="0.12"/>
  <circle cx="100" cy="500" r="120" fill="#0066CC" opacity="0.08"/>
  <path d="M0,200 Q200,150 400,250 T800,180 L800,0 L0,0 Z" fill="#FFF" opacity="0.04"/>
  <path d="M-50,600 Q150,500 400,550 T850,480 L850,600 Z" fill="#00BFFF" opacity="0.08"/>
  <!-- Heartbeat line -->
  <path d="M80,300 L120,300 L135,270 L155,330 L175,290 L195,310 L215,270 L235,330 L255,300 L300,300" stroke="#FFF" stroke-width="3" fill="none" opacity="0.25" filter="url(#glow2)"/>
  <!-- Plus symbol -->
  <g transform="translate(400,200)" opacity="0.12">
    <rect x="-40" y="-8" width="80" height="16" rx="8" fill="#FFF"/>
    <rect x="-8" y="-40" width="16" height="80" rx="8" fill="#FFF"/>
  </g>
  <!-- Device mockup - tablet -->
  <g filter="url(#shadow2)" transform="translate(230,140)">
    <rect x="0" y="0" width="340" height="240" rx="12" fill="#2C2C2C"/>
    <rect x="6" y="6" width="328" height="228" rx="8" fill="#FFF"/>
    <rect x="6" y="6" width="328" height="228" rx="8" fill="url(#bg2)" opacity="0.06"/>
    <circle cx="170" cy="234" r="3" fill="#555"/>
  </g>
  <!-- Medical cross -->
  <g transform="translate(580,130)" opacity="0.2">
    <rect x="-25" y="-8" width="50" height="16" rx="4" fill="#FFF"/>
    <rect x="-8" y="-25" width="16" height="50" rx="4" fill="#FFF"/>
  </g>
  <!-- Text design elements -->
  <text x="400" y="80" font-family="Arial,sans-serif" font-size="44" font-weight="900" fill="#FFF" text-anchor="middle" filter="url(#glow2)" opacity="0.12">DR. DAS</text>
  <text x="400" y="550" font-family="Georgia,serif" font-size="24" fill="#FFF" text-anchor="middle" opacity="0.3" letter-spacing="5">C L I N I C</text>
  <text x="400" y="578" font-family="Arial,sans-serif" font-size="12" fill="#FFF" text-anchor="middle" opacity="0.2" letter-spacing="4">YOUR HEALTH, OUR PRIORITY</text>
  <circle cx="310" cy="580" r="2.5" fill="#FFF" opacity="0.35"/>
  <circle cx="332" cy="580" r="2.5" fill="#FFF" opacity="0.25"/>
  <circle cx="354" cy="580" r="2.5" fill="#FFF" opacity="0.35"/>
  <circle cx="446" cy="580" r="2.5" fill="#FFF" opacity="0.35"/>
  <circle cx="468" cy="580" r="2.5" fill="#FFF" opacity="0.25"/>
  <circle cx="490" cy="580" r="2.5" fill="#FFF" opacity="0.35"/>
</svg>
